<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RARS CPRE3810 - RISC-V Simulator</title>
  <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1e1e1e; color: #ccc; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
    #header { background: #2d2d2d; padding: 8px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #444; }
    #header h1 { font-size: 1rem; font-weight: 600; color: #fff; }
    #status { font-size: 0.8rem; color: #aaa; }
    #display-container { flex: 1; position: relative; overflow: hidden; }
    #loading {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px; background: #1e1e1e; z-index: 10;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #444;
      border-top-color: #7cb9e8; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="header">
    <h1>RARS CPRE3810 &mdash; RISC-V Assembler &amp; Runtime Simulator</h1>
    <span id="status">Loading runtime...</span>
  </div>
  <div id="display-container">
    <div id="loading">
      <div class="spinner"></div>
      <span>Initializing CheerpJ runtime, please wait...</span>
    </div>
  </div>

  <script>
    (async function () {
      const status = document.getElementById('status');
      const loading = document.getElementById('loading');
      const container = document.getElementById('display-container');

      try {
        status.textContent = 'Initializing JVM...';
        await cheerpjInit({ version: 11 });

        status.textContent = 'Starting RARS...';
        cheerpjCreateDisplay(-1, -1, container);

        loading.classList.add('hidden');
        status.textContent = 'Running';

        const exitCode = await cheerpjRunJar('/app/rars-web/RARS_CPRE3810.jar');
        status.textContent = `Exited (code ${exitCode})`;
      } catch (err) {
        status.textContent = 'Error: ' + err.message;
        loading.innerHTML = `<p style="color:#f88">Failed to start RARS: ${err.message}</p>`;
      }
    })();
  </script>
</body>
</html>
